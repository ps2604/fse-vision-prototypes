# =============================================================================
# ENHANCED 2x A100 FSE Native FLUXA Training - Aggressive Segmentation Fix
# Specifically targets "predict all background" problem with stronger focusing

workerPoolSpecs:
- machineSpec:
    machineType: "a2-highgpu-2g"
    acceleratorType: "NVIDIA_TESLA_A100"
    acceleratorCount: 2
  replicaCount: 1
  containerSpec:
    imageUri: "gcr.io/bright-link-455716-h0/fluxa-training:FSEfull"
    command: ["python3", "fluxa_fse_native_train.py"]
    args:
      # --- Cloud Settings ---
      - "--project_id=bright-link-455716-h0"
      - "--bucket_name=auralith"

      # --- Training Settings ---
      - "--base_batch_size_per_gpu=3"
      - "--val_batch_size_per_gpu=2"
      - "--epochs=100"
      - "--learning_rate=0.00265"
      - "--lr_scaling_method=sqrt"
      - "--lr_ref_batch_size=16"
      - "--gradient_accumulation_steps=1"

      # --- Data Settings ---
      - "--max_train_samples=50000"
      - "--max_val_samples=5000"
      - "--checkpoint_save_steps=8000"

      # --- Model Parameters ---
      - "--base_channels=24"
      - "--field_evolution_rate=0.1"
      - "--max_cses_per_fil=8"
      - "--enable_syntha"

      # --- Loss Configuration (Aggressive Segmentation Focus) ---
      - "--keypoints_loss_weight=2.0"
      - "--segmentation_loss_weight=5.0"          # Higher than your 4.0 - forces more attention
      - "--surface_normals_loss_weight=1.5"
      - "--env_lighting_loss_weight=1.0"
      
      # --- Segmentation Loss (Aggressive Settings) ---
      - "--segmentation_loss_type=combined_dice_focal"
      - "--seg_dice_weight=0.6"                   # Favor Dice for boundary quality
      - "--seg_focal_weight=0.4"                  # Less focal, more dice
      - "--focal_loss_alpha=0.75"                 # Strong focus on rare foreground class
      - "--focal_loss_gamma=3.0"                  # Much stronger hard example focusing